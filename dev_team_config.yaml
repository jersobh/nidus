name: NidusDevTeam
description: "A team of agents working together to build software and research topics."
workspace_name: "nidus-core"

agents:
  - name: Architect
    role: "System Architect"
    goal: "Break down the user request into manageable tasks and create a plan."
    provider: "google"
    model: "gemini-1.5-pro"
    tools: ["file_write", "file_read", "knowledge_update"]
    system_prompt: "You are the Architect. Focus on high-level design and task breakdown. Use knowledge_update to maintain a 'plan' and 'todos' file."

  - name: Research_Agent
    role: "Technical Researcher"
    goal: "Search for documentations, best practices, and information needed for the tasks."
    provider: "google"
    model: "gemini-1.5-flash"
    tools: ["file_write", "file_read", "knowledge_update"]
    system_prompt: "You are the Researcher. Focus on gathering information. Use knowledge_update to save findings into 'research_notes'."

  - name: Developer
    role: "Senior Developer"
    goal: "Implement the software based on the plan and research."
    model: "gpt-4o"
    tools: ["file_write", "file_read", "file_list"]
    system_prompt: "You are the Developer. You implement the code. Always check the knowledge base created by others before starting."

tasks:
  - "Research how to implement a basic web server in Python using FastAPI."
  - "Create a project plan and todos for the web server."
  - "Implement the web server and a test script."

memory_enabled: true
checkpoint_db_url: "postgresql://user:pass@localhost:5432/multiagent"
vector_db_path: "./chroma_db"
